<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Control de Invitados</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-4">

        <!-- TITULO -->
        <div class="text-center mb-5">

            <h1 class="titulo">
                Control de Invitados
            </h1>

            <p class="subtitulo">
                Sistema de Control de Ceremonia
            </p>

        </div>


        <!-- BUSCADOR -->
        <div class="card p-4 mb-4 shadow-sm">

            <input
                type="text"
                id="buscador"
                class="form-control form-control-lg"
                placeholder="Buscar por nombre, apellido o grado...">

        </div>


        <!-- CONTADORES -->
        <div class="row mb-4">

            <div class="col-md-4 mb-3">

                <div class="card contador-card shadow-sm">

                    <div class="card-body text-center">

                        <h3>Total invitados</h3>

                        <h2 id="totalInvitados">0</h2>

                    </div>

                </div>

            </div>


            <div class="col-md-4 mb-3">

                <div class="card contador-card shadow-sm">

                    <div class="card-body text-center">

                        <h3>Ingresados</h3>

                        <h2 id="totalIngresados">0</h2>

                    </div>

                </div>

            </div>


            <div class="col-md-4 mb-3">

                <div class="card contador-card shadow-sm">

                    <div class="card-body text-center">

                        <h3>Pendientes</h3>

                        <h2 id="totalPendientes">0</h2>

                    </div>

                </div>

            </div>

        </div>


        <!-- TABLA -->
        <div class="table-responsive">

            <table class="table table-bordered table-hover align-middle">

                <thead class="table-dark">

                    <tr>

                        <th>Grado</th>

                        <th>Nombre Completo</th>

                        <th>Sector</th>

                        <th>Asiento</th>

                        <th>Estado</th>

                    </tr>

                </thead>

                <tbody id="tablaInvitados">

                </tbody>

            </table>

        </div>

    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
