<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Control Ceremonia</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container mt-4">

        <!-- Título -->

        <div class="text-center mb-4">

            <h1>Control de Invitados</h1>

            <p class="subtitulo">
                Sistema de Control de Ceremonia
            </p>

        </div>


        <!-- Buscar -->

        <div class="card p-3 mb-4">

            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Buscar por nombre, apellido o grado..."
            >

        </div>

        <!-- Estadísticas -->

        <div class="row mb-4">

            <div class="col-md-4">

                <div class="card estadistica">

                    <h5>Total invitados</h5>

                    <h2 id="totalInvitados">0</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card estadistica">

                    <h5>Ingresados</h5>

                    <h2 id="contadorIngresados">0</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card estadistica">

                    <h5>Pendientes</h5>

                    <h2 id="contadorPendientes">0</h2>

                </div>

            </div>

        </div>

        <!-- Tabla -->

        <div class="table-responsive">

            <table class="table table-hover table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>Grado</th>
                        <th>Nombre Completo</th>
                        <th>Sector</th>
                        <th>Asiento</th>
                        <th>Estado</th>

                    </tr>

                </thead>

                <tbody id="tablaInvitados">

                </tbody>

            </table>

        </div>

    </div>

    <!-- XLSX -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
