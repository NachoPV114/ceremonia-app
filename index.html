<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Control de Invitados</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container py-4">

        <!-- TITULO -->
        <div class="text-center mb-5">

            <h1 class="titulo">
                Control de Invitados
            </h1>

            <p class="subtitulo">
                Sistema de Control de Ceremonia
            </p>

        </div>


        <!-- BUSCADOR -->
        <div class="card p-4 mb-4 shadow-sm">

            <input
                type="text"
                id="buscador"
                class="form-control form-control-lg"
                placeholder="Buscar por nombre, apellido o grado...">

        </div>


        <!-- CONTADORES -->
        <div class="row mb-4">

            <!-- TOTAL -->
            <div class="col-md-4 mb-3">

                <div class="card contador-card shadow-sm">

                    <div class="card-body text-center">

                        <h5>Total invitados</h5>

                        <h2 id="totalInvitados">0</h2>

                    </div>

                </div>

            </div>


            <!-- INGRESADOS -->
            <div class="col-md-4 mb-3">

                <div class="card contador-card shadow-sm">

                    <div class="card-body text-center">

                        <h5>Ingresados</h5>

                        <h2 id="ingresados">0</h2>

                    </div>

                </div>

            </div>


            <!-- PENDIENTES -->
            <div class="col-md-4 mb-3">

                <div class="card contador-card shadow-sm">

                    <div class="card-body text-center">

                        <h5>Pendientes</h5>

                        <h2 id="pendientes">0</h2>

                    </div>

                </div>

            </div>

        </div>


        <!-- TABLA -->
        <div class="table-responsive shadow-sm rounded">

            <table class="table table-bordered table-hover align-middle bg-white">

                <thead class="table-dark">

                    <tr>

                        <th>Grado</th>

                        <th>Nombre Completo</th>

                        <th>Sector</th>

                        <th>Asiento</th>

                        <th>Estado</th>

                    </tr>

                </thead>

                <tbody id="tablaInvitados">

                </tbody>

            </table>

        </div>

    </div>

    <!-- SCRIPT -->
    <!-- FIREBASE -->
<script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
        getFirestore
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // CONFIG FIREBASE
    const firebaseConfig = {

        apiKey: "AIzaSyAW5NgSimObS9LScI-EUjPqP9_ai6h-ePU",

        authDomain:
            "ceremonia-lanzamiento.firebaseapp.com",

        projectId:
            "ceremonia-lanzamiento",

        storageBucket:
            "ceremonia-lanzamiento.firebasestorage.app",

        messagingSenderId:
            "291757329730",

        appId:
            "1:291757329730:web:3a4795b7755173b4fd4cdb"

    };

    // INICIALIZAR FIREBASE
    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    // HACER GLOBAL
    window.db = db;

</script>

<!-- SCRIPT PRINCIPAL -->
<script src="script.js"></script>

</body>

</html>
